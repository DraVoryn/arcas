name: arcas
description: "Personal finance app for managing transactions, categories and reports."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  in_app_purchase: ^3.2.3
  http: ^1.3.0
  crypto: ^3.0.7                    
  flutter_secure_storage: ^9.2.4    
  local_auth: ^2.3.0               

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  drift_dev: ^2.23.1
  freezed: ^2.5.7
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  generate: true

  
