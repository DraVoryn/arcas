name: arcas
description: "Personal finance app for managing transactions, categories and reports."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  in_app_purchase: ^3.2.3
  http: ^1.3.0
  crypto: ^3.0.7                    
  flutter_secure_storage: ^10.0.0    
  local_auth: ^3.0.1               

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  generate: true

  
